<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket - PrimeRoutes</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<style>
body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#84d7e1,#e27f74);min-height:100vh;color:#333;}
.ticket-card{background:white;border-radius:12px;padding:25px;margin-top:30px;box-shadow:0 6px 25px rgba(0,0,0,.15);}
h5{margin-bottom:15px;}
p{margin:0.3rem 0;}
.btn-primary{background:linear-gradient(90deg,#f6e27a,#f06292);border:none;font-weight:600;margin-top:20px;}
.btn-primary:hover{background:linear-gradient(90deg,#f06292,#f6e27a);}
</style>
</head>
<body>

<nav class="navbar navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="index.html" style="color:#f18eda;">PrimeRoutes</a>
    <div id="userNav"></div>
  </div>
</nav>

<main class="container my-5">
  <h2 class="mb-4 text-center">Your Ticket</h2>
  <div id="ticketContainer" class="ticket-card"></div>
  <div class="text-center">
    <button class="btn btn-primary" onclick="window.print()">Print Ticket</button>
  </div>
</main>

<script>
// Check authentication
function checkAuth() {
  const userId = localStorage.getItem('userId');
  if (!userId) {
    alert('Please login to continue.');
    window.location.href = 'login.html';
    return false;
  }
  return true;
}

// Navbar
function updateNavbar() {
  const userNav = document.getElementById('userNav');
  const userName = localStorage.getItem('userName');
  if(userName){
    userNav.innerHTML = `<span class="me-3">Welcome, ${userName}</span>
      <button class="btn btn-outline-secondary" onclick="logout()">Logout</button>`;
  }else{
    userNav.innerHTML = `<a href="login.html" class="btn btn-outline-primary me-2">Login</a>
      <a href="register.html" class="btn btn-primary">Register</a>`;
  }
}
function logout(){
  localStorage.removeItem('userName');
  localStorage.removeItem('userId');
  localStorage.removeItem('userRole');
  updateNavbar();
}
document.addEventListener('DOMContentLoaded', () => {
  if (!checkAuth()) return;
  updateNavbar();
  loadTicket();
});

// Load ticket from API
async function loadTicket() {
  const pnr = localStorage.getItem('pnr');
  if (!pnr) {
    alert('No PNR found!');
    window.location.href = 'main page.html';
    return;
  }

  try {
    const response = await fetch(`/api/ticket/${pnr}`);
    const ticketData = await response.json();
    if (response.ok) {
      const ticket = document.getElementById('ticketContainer');
      ticket.innerHTML = `
        <h5>${ticketData.route}</h5>
        <p><strong>PNR:</strong> ${ticketData.pnr}</p>
        <p><strong>Operator:</strong> ${ticketData.operator}</p>
        <p><strong>Bus Type:</strong> ${ticketData.bus_type}</p>
        <p><strong>Departure:</strong> ${new Date(ticketData.departure).toLocaleString()}</p>
        <p><strong>Arrival:</strong> ${new Date(ticketData.arrival).toLocaleString()}</p>
        <p><strong>Total Amount:</strong> ₹${ticketData.total_amount}</p>
        <h6>Passengers:</h6>
        <ul>
          ${ticketData.passengers.map(p => `<li>Seat ${p.seat_no}: ${p.name} (${p.age}, ${p.gender})</li>`).join('')}
        </ul>
      `;
      // Store ticket data in localStorage for persistence
      localStorage.setItem('ticketData', JSON.stringify(ticketData));
    } else {
      alert('Ticket not found: ' + ticketData.error);
      window.location.href = 'main page.html';
    }
  } catch (error) {
    console.error('Error loading ticket:', error);
    alert('Error loading ticket. Please try again.');
  }
}
</script>
</body>
</html>
