<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - PrimeRoutes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #84d7e1, #e27f74);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 6px 25px rgba(0,0,0,0.15);
    }
    .form-control { border-radius: 12px; }
    .btn-primary {
      background: linear-gradient(90deg, #f6e27a, #f06292);
      border: none; font-weight: 600;
    }
    .btn-primary:hover {
      background: linear-gradient(90deg, #f06292, #f6e27a);
      transform: translateY(-2px);
    }
    .brand-title {
      font-size: 2rem;
      background: linear-gradient(90deg, #f6e27a, #f06292, #c73642);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      font-weight: 900; text-align: center; margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1 class="brand-title">PrimeRoutes</h1>
    <h2 class="text-center mb-4">Login</h2>
    <form id="loginForm">
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>
    <p class="text-center mt-3">Don't have an account? <a href="register.html">Register here</a></p>
  </div>

  <script>
    const loginForm = document.getElementById('loginForm');

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      // Get users from localStorage
      const users = JSON.parse(localStorage.getItem('users')) || [];

      // Find matching user
      const user = users.find(u => u.email === email && u.password === password);

      if (user) {
        // Save login session
        localStorage.setItem('userId', email);
        localStorage.setItem('userName', user.full_name);
        localStorage.setItem('userRole', 'passenger'); // Default role
        alert('Login successful!');
        window.location.href = 'main page.html';
      } else {
        alert('Invalid email or password.');
      }
    });
  </script>
</body>
</html>
