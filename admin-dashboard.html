<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Dashboard - PrimeRoutes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #004aad, #d43e98);
      min-height: 100vh;
      padding: 20px;
      color: #fff;
    }
    .dashboard-card {
      background: rgba(255,255,255,0.95);
      padding: 30px;
      border-radius: 18px;
      max-width: 900px;
      margin: 0 auto;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      color: #333;
    }
    h2 {
      color: #004aad;
      font-weight: 700;
      margin-bottom: 20px;
      text-align: center;
    }
    .form-control, .form-select {
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 15px;
    }
    .btn-primary {
      background: linear-gradient(90deg, #004aad, #d43e98);
      border: none;
      font-weight: 600;
      border-radius: 12px;
      padding: 12px 20px;
      transition: 0.3s;
    }
    .btn-primary:hover {
      background: linear-gradient(90deg, #d43e98, #004aad);
      transform: translateY(-2px);
    }
    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px;
      border-bottom: 1px solid #ddd;
      text-align: left;
    }
    th {
      background-color: #004aad;
      color: white;
    }
    .btn-approve {
      background-color: #28a745;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-reject {
      background-color: #dc3545;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
    }
    .section {
      margin-top: 40px;
    }
    .route-form {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="dashboard-card">
    <h2>Admin Dashboard - Approve Operators & Add Routes</h2>

    <!-- Admin Login -->
    <div id="loginSection">
      <h4>Admin Login</h4>
      <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
        <input type="email" id="adminEmail" class="form-control" placeholder="Admin Email" required />
        <input type="password" id="adminPassword" class="form-control" placeholder="Password" required />
        <button type="submit" class="btn btn-primary">Login</button>
      </form>
      <div id="loginMessage" style="color: red; margin-top: 10px;"></div>
    </div>

    <!-- Dashboard Content -->
    <div id="dashboardContent" style="display:none;">
      <h4>Pending Operator Registrations</h4>
      <table id="pendingOperatorsTable">
        <thead>
          <tr>
            <th>Company Name</th>
            <th>Owner Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Address</th>
            <th>Fleet Size</th>
            <th>Registered On</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <!-- Pending operators will be populated here -->
        </tbody>
      </table>

      <div class="section">
        <h4>Add New Route</h4>
        <form id="addRouteForm" class="route-form" onsubmit="handleAddRoute(event)">
          <div class="row g-3">
            <div class="col-md-3">
              <input type="text" id="fromCity" class="form-control" placeholder="From City" required />
            </div>
            <div class="col-md-3">
              <input type="text" id="toCity" class="form-control" placeholder="To City" required />
            </div>
            <div class="col-md-3">
              <input type="number" id="distanceKm" class="form-control" placeholder="Distance (km)" required />
            </div>
            <div class="col-md-3">
              <input type="time" id="estimatedDuration" class="form-control" placeholder="Estimated Duration" required />
            </div>
          </div>
          <button type="submit" class="btn btn-primary mt-3">Add Route</button>
        </form>
        <div id="routeMessage" style="margin-top: 10px;"></div>
      </div>

      <div class="section">
        <h4>Add New Bus</h4>
        <form id="addBusForm" class="route-form" onsubmit="handleAddBus(event)">
          <div class="row g-3">
            <div class="col-md-6">
              <select id="busOperator" class="form-select" required>
                <option value="">Select Operator</option>
                <!-- Operators will be populated here -->
              </select>
            </div>
            <div class="col-md-6">
              <select id="busType" class="form-select" required>
                <option value="">Select Bus Type</option>
                <option value="AC Sleeper">AC Sleeper</option>
                <option value="AC Semi-Sleeper">AC Semi-Sleeper</option>
                <option value="Non-AC Sleeper">Non-AC Sleeper</option>
                <option value="Non-AC Semi-Sleeper">Non-AC Semi-Sleeper</option>
                <option value="Volvo">Volvo</option>
                <option value="Luxury">Luxury</option>
              </select>
            </div>
            <div class="col-md-6">
              <input type="number" id="busCapacity" class="form-control" placeholder="Capacity" min="1" required />
            </div>
            <div class="col-md-6">
              <input type="text" id="busFrom" class="form-control" placeholder="From City" required />
            </div>
            <div class="col-md-6">
              <input type="text" id="busTo" class="form-control" placeholder="To City" required />
            </div>
            <div class="col-md-6">
              <input type="datetime-local" id="busDeparture" class="form-control" required />
            </div>
            <div class="col-md-6">
              <input type="datetime-local" id="busArrival" class="form-control" required />
            </div>
            <div class="col-md-6">
              <input type="number" id="busPrice" class="form-control" placeholder="Price per Seat" min="0" step="0.01" required />
            </div>
            <div class="col-md-6">
              <label>Amenities:</label>
              <div class="row">
                <div class="col-6">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="busWifi" value="WiFi">
                    <label class="form-check-label" for="busWifi">WiFi</label>
                  </div>
                </div>
                <div class="col-6">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="busWater" value="Water Bottle">
                    <label class="form-check-label" for="busWater">Water Bottle</label>
                  </div>
                </div>
                <div class="col-6">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="busEntertainment" value="Entertainment">
                    <label class="form-check-label" for="busEntertainment">Entertainment</label>
                  </div>
                </div>
                <div class="col-6">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="busCharging" value="Charging Point">
                    <label class="form-check-label" for="busCharging">Charging Point</label>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <button type="submit" class="btn btn-primary mt-3">Add Bus</button>
        </form>
        <div id="busMessage" style="margin-top: 10px;"></div>
      </div>
    </div>
  </div>

  <script>
    let isAdminLoggedIn = false;

    async function handleAdminLogin(event) {
      event.preventDefault();
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;
      const loginMessage = document.getElementById('loginMessage');
      loginMessage.textContent = '';

      try {
        const res = await fetch('http://localhost:3000/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        if (!res.ok) {
          const errorData = await res.json();
          loginMessage.textContent = errorData.error || 'Login failed';
          return;
        }
        isAdminLoggedIn = true;
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('dashboardContent').style.display = 'block';
        fetchPendingOperators();
        fetchApprovedOperators();
      } catch (err) {
        loginMessage.textContent = 'Error: ' + err.message;
      }
    }

    async function fetchPendingOperators() {
      if (!isAdminLoggedIn) return;
      const tbody = document.querySelector('#pendingOperatorsTable tbody');
      tbody.innerHTML = '';
      try {
        const res = await fetch('http://localhost:3000/api/admin/pending-operators');
        const operators = await res.json();
        if (operators.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">No pending operators</td></tr>';
          return;
        }
        operators.forEach(op => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td>${op.company_name}</td>
            <td>${op.owner_name}</td>
            <td>${op.email}</td>
            <td>${op.phone}</td>
            <td>${op.address}</td>
            <td>${op.fleet_size}</td>
            <td>${new Date(op.created_at).toLocaleDateString()}</td>
            <td>
              <button class="btn-approve" onclick="handleApproveOperator(${op.id})">Approve</button>
              <button class="btn-reject" onclick="handleRejectOperator(${op.id})">Reject</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="8" style="color:red;">Error loading operators: ${err.message}</td></tr>`;
      }
    }

    async function handleApproveOperator(operatorId) {
      await updateOperatorStatus(operatorId, 'approve');
    }

    async function handleRejectOperator(operatorId) {
      await updateOperatorStatus(operatorId, 'reject');
    }

    async function updateOperatorStatus(operatorId, action) {
      try {
        const res = await fetch('http://localhost:3000/api/admin/approve-operator', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ operator_id: operatorId, action })
        });
        const data = await res.json();
        alert(data.message);
        fetchPendingOperators();
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    async function handleAddRoute(event) {
      event.preventDefault();
      const fromCity = document.getElementById('fromCity').value;
      const toCity = document.getElementById('toCity').value;
      const distanceKm = document.getElementById('distanceKm').value;
      const estimatedDuration = document.getElementById('estimatedDuration').value;
      const routeMessage = document.getElementById('routeMessage');
      routeMessage.textContent = '';

      try {
        const res = await fetch('http://localhost:3000/api/admin/add-route', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ from_city: fromCity, to_city: toCity, distance_km: distanceKm, estimated_duration: estimatedDuration })
        });
        const data = await res.json();
        if (res.ok) {
          routeMessage.style.color = 'green';
          routeMessage.textContent = data.message;
          event.target.reset();
        } else {
          routeMessage.style.color = 'red';
          routeMessage.textContent = data.error || 'Failed to add route';
        }
      } catch (err) {
        routeMessage.style.color = 'red';
        routeMessage.textContent = 'Error: ' + err.message;
      }
    }

    async function fetchApprovedOperators() {
      if (!isAdminLoggedIn) return;
      const select = document.getElementById('busOperator');
      select.innerHTML = '<option value="">Select Operator</option>';
      try {
        const res = await fetch('http://localhost:3000/api/admin/approved-operators');
        const operators = await res.json();
        operators.forEach(op => {
          const option = document.createElement('option');
          option.value = op.id;
          option.textContent = op.company_name;
          select.appendChild(option);
        });
      } catch (err) {
        console.error('Error fetching operators:', err);
      }
    }

    async function handleAddBus(event) {
      event.preventDefault();
      const operator_id = document.getElementById('busOperator').value;
      const bus_type = document.getElementById('busType').value;
      const capacity = parseInt(document.getElementById('busCapacity').value);
      const route_from = document.getElementById('busFrom').value;
      const route_to = document.getElementById('busTo').value;
      const departure_time = document.getElementById('busDeparture').value;
      const arrival_time = document.getElementById('busArrival').value;
      const price = parseFloat(document.getElementById('busPrice').value);

      const amenities = [];
      if (document.getElementById('busWifi').checked) amenities.push('WiFi');
      if (document.getElementById('busWater').checked) amenities.push('Water Bottle');
      if (document.getElementById('busEntertainment').checked) amenities.push('Entertainment');
      if (document.getElementById('busCharging').checked) amenities.push('Charging Point');

      const busMessage = document.getElementById('busMessage');
      busMessage.textContent = '';

      try {
        const res = await fetch('http://localhost:3000/api/add-bus', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            operator_id: operator_id || null,
            bus_type,
            capacity,
            route_from,
            route_to,
            departure_time,
            arrival_time,
            price,
            amenities: amenities.join(', ')
          })
        });
        const data = await res.json();
        if (res.ok) {
          busMessage.style.color = 'green';
          busMessage.textContent = data.message;
          event.target.reset();
        } else {
          busMessage.style.color = 'red';
          busMessage.textContent = data.error || 'Failed to add bus';
        }
      } catch (err) {
        busMessage.style.color = 'red';
        busMessage.textContent = 'Error: ' + err.message;
      }
    }
  </script>
</body>
</html>
