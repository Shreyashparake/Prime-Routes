<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - PrimeRoutes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #84d7e1, #e27f74);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .register-container {
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      box-shadow: 0 6px 25px rgba(0,0,0,0.15);
    }
    .form-control { border-radius: 12px; }
    .btn-primary {
      background: linear-gradient(90deg, #f6e27a, #f06292);
      border: none; font-weight: 600;
    }
    .btn-primary:hover {
      background: linear-gradient(90deg, #f06292, #f6e27a);
      transform: translateY(-2px);
    }
    .brand-title {
      font-size: 2rem;
      background: linear-gradient(90deg, #f6e27a, #f06292, #c73642);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      font-weight: 900; text-align: center; margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="register-container">
    <h1 class="brand-title">PrimeRoutes</h1>
    <h2 class="text-center mb-4">Create Account</h2>
    <form id="registerForm">
      <div class="mb-3">
        <label for="full_name" class="form-label">Full Name</label>
        <input type="text" id="full_name" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" id="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="phone" class="form-label">Phone</label>
        <input type="tel" id="phone" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Register</button>
    </form>
    <p class="text-center mt-3">Already have an account? <a href="login.html">Login here</a></p>
  </div>

  <script>
    const registerForm = document.getElementById('registerForm');

    registerForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const full_name = document.getElementById('full_name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!full_name || !email || !phone || !password) {
        alert("Please fill all fields.");
        return;
      }

      // Get existing users from localStorage
      const users = JSON.parse(localStorage.getItem('users')) || [];

      // Check if email already exists
      const userExists = users.some(user => user.email === email);
      if (userExists) {
        alert("Email already registered. Try logging in.");
        return;
      }

      // Add new user
      users.push({ full_name, email, phone, password });
      localStorage.setItem('users', JSON.stringify(users));
      alert("Registration successful! Please login.");
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
