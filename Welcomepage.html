<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome - PrimeRoutes</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #004aad, #d43e98, #f6e27a);
      background-size: 300% 300%;
      animation: gradientBG 8s ease infinite;
      color: white;
      text-align: center;
      transition: opacity 1s ease; /* for fade-out */
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .welcome-container {
      max-width: 700px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 25px;
      backdrop-filter: blur(15px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.3);
      animation: fadeIn 1.5s ease forwards;
      transition: transform 1s ease, opacity 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand-title {
      font-size: 3.5rem;
      font-weight: 900;
      background: linear-gradient(90deg, #f6e27a, #ff5aa4, #ff2e63);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: inline-block;
      letter-spacing: 2px;
      margin-bottom: 15px;
      animation: shine 5s linear infinite;
    }

    @keyframes shine {
      0% { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .tagline {
      font-size: 1.2rem;
      margin-bottom: 0;
      font-weight: 500;
    }

    /* Fade-out + zoom */
    .fade-out {
      opacity: 0;
      transform: scale(1.1);
    }
  </style>
</head>
<body>
  <div class="welcome-container" id="welcomeBox">
    <h1 class="welcome-title">Welcome to</h1>
    <h1 class="brand-title">PrimeRoutes</h1>
    <p class="tagline">Your Journey, Our Priority – <strong>Fast, Safe & Easy</strong></p>
  </div>

  <script>
    // Start fade-out + zoom after 4 seconds
    setTimeout(() => {
      document.getElementById("welcomeBox").classList.add("fade-out");
    }, 4000);

    // Redirect after 5 seconds
    setTimeout(() => {
      window.location.href = "main page.html";
    }, 6000);
  </script>
</body>
</html>
