<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking - PrimeRoutes</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<style>
body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#84d7e1,#e27f74);min-height:100vh;color:#333;}
.card{border-radius:12px;padding:20px;margin-bottom:20px;box-shadow:0 6px 20px rgba(0,0,0,.1);}
.btn-primary{background:linear-gradient(90deg,#f6e27a,#f06292);border:none;font-weight:600;}
.btn-primary:hover{background:linear-gradient(90deg,#f06292,#f6e27a);}
</style>
</head>
<body>

<nav class="navbar navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="main page.html" style="color:#f18eda;">PrimeRoutes</a>
    <div id="userNav"></div>
  </div>
</nav>

<main class="container my-5">
  <h2 class="mb-4 text-center">Booking Details</h2>
  <div id="bookingInfo" class="card"></div>
  <div class="text-center mt-4">
    <button class="btn btn-primary" id="confirmBtn">Confirm Booking</button>
  </div>
</main>

<script>
// Check authentication
function checkAuth() {
  const userId = localStorage.getItem('userId');
  if (!userId) {
    alert('Please login to continue.');
    window.location.href = 'login.html';
    return false;
  }
  return true;
}

// Navbar
function updateNavbar() {
  const userNav = document.getElementById('userNav');
  const userName = localStorage.getItem('userName');
  if(userName){
    userNav.innerHTML = `<span class="me-3">Welcome, ${userName}</span>
      <button class="btn btn-outline-secondary" onclick="logout()">Logout</button>`;
  }else{
    userNav.innerHTML = `<a href="login.html" class="btn btn-outline-primary me-2">Login</a>
      <a href="register.html" class="btn btn-primary">Register</a>`;
  }
}
function logout(){
  localStorage.removeItem('userName');
  localStorage.removeItem('userId');
  localStorage.removeItem('userRole');
  updateNavbar();
}
document.addEventListener('DOMContentLoaded', () => {
  if (!checkAuth()) return;
  updateNavbar();
  loadBookingInfo();
});

// Load booking info
function loadBookingInfo() {
  const selectedBus = JSON.parse(localStorage.getItem('selectedBus'));
  const selectedSeats = JSON.parse(localStorage.getItem('selectedSeats') || '[]');
  if(!selectedBus || selectedSeats.length === 0){
    alert('Missing booking data!');
    window.location.href = 'main page.html';
    return;
  }

  // Show booking info
  const bookingInfo = document.getElementById('bookingInfo');
  const totalPrice = selectedSeats.length * selectedBus.price;
  bookingInfo.innerHTML = `
    <h5>${selectedBus.route_from} → ${selectedBus.route_to} | ${selectedBus.bus_type}</h5>
    <p><strong>Seats Selected:</strong> ${selectedSeats.join(', ')}</p>
    <p><strong>Price per Seat:</strong> ₹${selectedBus.price}</p>
    <p><strong>Total Price:</strong> ₹${totalPrice}</p>
  `;

  // Confirm booking
  document.getElementById('confirmBtn').addEventListener('click', async ()=>{
    try {
      const passengers = selectedSeats.map(seat => ({
        name: 'Passenger ' + seat, // Placeholder; in real app, collect details
        age: 25,
        gender: 'Male',
        phone: '1234567890',
        email: 'passenger@example.com',
        seat: seat.toString()
      }));

      const response = await fetch('/api/book-seats', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          bus_id: selectedBus.id,
          passengers,
          total_amount: totalPrice
        })
      });
      const data = await response.json();
      if (response.ok) {
        localStorage.setItem('pnr', data.pnr);
        localStorage.setItem('bookingId', data.booking_id);
        // Clear temporary selections
        localStorage.removeItem('selectedSeats');
        localStorage.removeItem('selectedBus');
        localStorage.removeItem('selectedBusId');
        window.location.href = 'ticket.html';
      } else {
        alert('Booking failed: ' + data.error);
      }
    } catch (error) {
      console.error('Error booking:', error);
      alert('An error occurred during booking. Please try again.');
    }
  });
}
</script>
</body>
</html>
